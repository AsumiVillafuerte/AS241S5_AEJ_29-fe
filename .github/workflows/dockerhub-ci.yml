name: Docker Hub CI/CD

on:
  push:
    branches:
      - fe
  pull_request:
    branches:
      - fe
  schedule:
    # Ejecutar todos los días a las 8:00 AM hora Perú (UTC-5) → 1:00 PM UTC
    - cron: '0 13 * * *'
  workflow_dispatch:  # Permite ejecución manual desde GitHub Actions UI

jobs:
  dockerhub:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout del código
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Configurar Docker Buildx (para builds optimizados)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login a Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_ASUMI }}
          password: ${{ secrets.DOCKERHUB_TOKEN_ASUMI }}

      # 4. Extraer metadata para tags y labels
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME_ASUMI }}/as241s5_aej_29-fe
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      # 5. Build y Push con caché optimizado
      - name: Build and Push Docker Image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME_ASUMI }}/as241s5_aej_29-fe:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME_ASUMI }}/as241s5_aej_29-fe:buildcache,mode=max
          build-args: |
            NODE_ENV=production

      # 6. Verificar imagen creada
      - name: Verify Docker Image
        if: success()
        run: |
          echo "✅ Docker image built and pushed successfully!"
          echo "Tags: ${{ steps.meta.outputs.tags }}"

      # 7. Notificar si falla
      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Docker build failed!"
          echo "Check the logs above for details."
          exit 1